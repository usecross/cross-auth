<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Cross-Auth FastAPI Hybrid Example{% endblock %}</title>
    <style>
      :root {
        --text: #1a1a1a;
        --muted: #666;
        --border: #d0d0d0;
        --accent: #0f766e;
        --bg: #fafafa;
        --mono: "SFMono-Regular", "SF Mono", Monaco, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        min-height: 100vh;
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.55;
        background: var(--bg);
      }

      a { color: var(--accent); }

      /* ── Shell ── */
      .shell {
        max-width: 960px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        min-height: 100vh;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 13px;
      }
      .header-title {
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .header-nav { display: flex; gap: 16px; }
      .header-nav a { text-decoration: none; color: var(--muted); }
      .header-nav a:hover { color: var(--text); }

      /* ── Hero ── */
      .hero {
        padding: 32px 24px;
        border-bottom: 1px solid var(--border);
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        margin-bottom: 8px;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
      }
      h2 {
        font-size: 0.82rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
      }
      p { color: var(--muted); }
      .lead { max-width: 60ch; font-size: 0.94rem; }

      /* ── Grid ── */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .grid > * {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }
      .grid > *:nth-child(odd) {
        border-right: 1px solid var(--border);
      }
      .grid.cols-1 { grid-template-columns: 1fr; }
      .grid.cols-1 > * { border-right: none; }
      .full { grid-column: 1 / -1; border-right: none !important; }

      /* ── Stack ── */
      .stack { display: grid; gap: 10px; }

      /* ── List ── */
      ul { padding-left: 18px; color: var(--muted); font-size: 0.94rem; }
      li + li { margin-top: 6px; }

      /* ── Code ── */
      code {
        font-family: var(--mono);
        font-size: 0.88em;
        background: rgba(0,0,0,0.05);
        padding: 2px 5px;
        border-radius: 3px;
      }
      pre {
        overflow-x: auto;
        padding: 14px;
        font-family: var(--mono);
        font-size: 0.82rem;
        line-height: 1.55;
        background: #1a1a2e;
        color: #e0e0e0;
        border-radius: 4px;
      }
      pre code { background: none; padding: 0; }

      /* ── Actions ── */
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; justify-self: start; }

      .button, button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
        padding: 5px 10px;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        font-family: var(--sans);
        line-height: 1.4;
        color: var(--text);
        background: white;
        transition: background 0.1s;
      }
      .actions { align-items: center; }
      .button:hover, button:hover { background: #f0f0f0; }
      .button.primary, button.primary {
        background: var(--text);
        color: white;
        border-color: var(--text);
      }
      .button.primary:hover, button.primary:hover { background: #333; }

      /* ── Pills ── */
      .meta { display: flex; flex-wrap: wrap; gap: 6px; }
      .pill {
        font-family: var(--mono);
        font-size: 0.75rem;
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--muted);
      }
      .pill.warn { border-color: #e5a04b; color: #92600a; }
      .pill.ok { border-color: var(--accent); color: var(--accent); }

      .label {
        display: block;
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      form { margin: 0; }

      .field {
        display: grid;
        gap: 6px;
      }
      .field input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 9px 10px;
        font: inherit;
        color: var(--text);
        background: white;
      }
      .field input:focus {
        outline: 2px solid rgba(15, 118, 110, 0.15);
        border-color: var(--accent);
      }
      .notice {
        display: inline-flex;
        align-items: center;
        margin-top: 14px;
        padding: 6px 10px;
        border: 1px solid #e5a04b;
        border-radius: 4px;
        color: #92600a;
        background: #fff9ef;
        font-size: 0.88rem;
      }

      /* ── Footer ── */
      .footer {
        padding: 14px 24px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        border-top: 1px solid var(--border);
        text-align: center;
      }

      @media (max-width: 640px) {
        .grid { grid-template-columns: 1fr; }
        .grid > *:nth-child(odd) { border-right: none; }
        h1 { font-size: 1.3rem; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <span class="header-title">cross-auth</span>
        <nav class="header-nav">
          <a href="/">Home</a>
          <a href="/profile">Profile</a>
          <a href="/api/me-session">/api/me-session</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
      <footer class="footer">cross-auth fastapi hybrid example</footer>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
