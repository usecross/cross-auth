name: Examples E2E

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/examples-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/examples-e2e.yml"

jobs:
  spa-fastapi-hybrid-e2e:
    name: SPA + FastAPI hybrid example
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Sync FastAPI example dependencies
        run: uv sync --frozen --package cross-auth-fastapi-example

      - name: Install SPA dependencies
        working-directory: examples/spa
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: examples/spa
        run: bunx playwright install --with-deps chromium

      - name: Run example end-to-end tests
        working-directory: examples/spa
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            examples/spa/playwright-report
            examples/spa/test-results
          if-no-files-found: ignore
